<!DOCTYPE html>
<html>

<head>
  <title>Playwright Visible Mouse Test</title>
</head>

<body>

  <h1>Welcome User</h1>


  <!-- =====================
     Fields
===================== -->

  <input id="emailInput" name="username" placeholder="Email" />


  <input placeholder="Password" />



  <!-- =====================
     Checkbox
===================== -->

  <label>
    <input type="checkbox" name="remember">
    Remember me
  </label>



  <!-- =====================
     Radio
===================== -->

  <label>
    <input type="radio" name="gender" value="male">
    Male
  </label>


  <label>
    <input type="radio" name="gender" value="female">
    Female
  </label>



  <!-- =====================
     Select
===================== -->

  <select name="Country">

    <option value="vn">
      Vietnam
    </option>

    <option value="jp">
      Japan
    </option>

  </select>



  <!-- =====================
     Buttons
===================== -->

  <button class="primary submit-btn">
    Submit
  </button>


  <button>
    Save Button
  </button>



  <!-- =====================
     Link
===================== -->

  <a href="#">
    Home
  </a>



  <!-- =====================
     Image
===================== -->

  <img src="logo.png" alt="Company logo" width="100" height="100" />



  <!-- =====================
     Table
===================== -->

  <table border="1">

    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Country</th>
      </tr>
    </thead>


    <tbody>

      <tr>
        <td>Alice</td>
        <td>22</td>
        <td>Japan</td>
      </tr>


      <tr>
        <td>Bob</td>
        <td>22</td>
        <td>Japan</td>
      </tr>


    </tbody>

  </table>



  <!-- =====================
     Result
===================== -->

  <div>
    Login Successful
  </div>


</body>

</html>
