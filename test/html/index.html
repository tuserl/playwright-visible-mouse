<!DOCTYPE html>
<html>

<head>
  <title>UI Test Page</title>
</head>

<body>

  <h1>UI Element Testing</h1>


  <!-- Field -->
  <label>Email</label>
  <input placeholder="Email" id="email">


  <br><br>

  <label for="password">Password</label>
  <input type="password" placeholder="Password" id="password">

  <br><br>

  <!-- Button -->
  <button>
    Submit
  </button>


  <br><br>


  <!-- Link -->
  <a href="#">
    Home
  </a>


  <br><br>


  <!-- Text -->
  <p>
    Login Successful
  </p>


  <br><br>


  <!-- Combobox -->
  <label for="country">
    Country
  </label>

  <select id="country" aria-label="Country">
    <option value="vn">
      Vietnam
    </option>

    <option value="jp">
      Japan
    </option>

    <option value="us">
      USA
    </option>
  </select>


  <br><br>


  <!-- Checkbox -->
  <label>
    <input type="checkbox" aria-label="Remember me">
    Remember me
  </label>


  <br><br>


  <!-- Radio -->
  <label>
    <input type="radio" name="gender" aria-label="Male">
    Male
  </label>


  <label>
    <input type="radio" name="gender" aria-label="Female">
    Female
  </label>


  <br><br>


  <!-- Image -->
  <img src="https://via.placeholder.com/150" alt="Company logo">


  <br><br>


  <!-- Table -->
  <table aria-label="User table" border="1">

    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
      </tr>
    </thead>


    <tbody>

      <tr>
        <td>John</td>
        <td>20</td>
      </tr>

      <tr>
        <td>Alice</td>
        <td>22</td>
      </tr>

    </tbody>

  </table>


</body>

</html>
